name: Storybook — Chromatic Deploy

on:
  push:
    branches:
      - main
    paths:
      - "packages/design-system/web/**"
  pull_request:
    branches:
      - main
    paths:
      - "packages/design-system/web/**"

jobs:
  chromatic:
    name: Publish Storybook to Chromatic
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npx yarn install

      - name: Build Storybook
        working-directory: packages/design-system/web
        run: yarn build-storybook

      - name: Publish to Chromatic
        id: chromatic
        working-directory: packages/design-system/web
        run: yarn chromatic --storybook-build-dir=storybook-static
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Comment PR with Storybook URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📖 Storybook publicado no Chromatic: ${{ steps.chromatic.outputs.storybookUrl }}`
            })
