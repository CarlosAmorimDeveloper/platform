name: Storybook Mobile — Chromatic Deploy

on:
  push:
    branches:
      - main
    paths:
      - "packages/design-system/mobile/**"
  pull_request:
    branches:
      - main
    paths:
      - "packages/design-system/mobile/**"

jobs:
  chromatic:
    name: Publish Mobile Storybook to Chromatic
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npx yarn install

      - name: Build Storybook
        working-directory: packages/design-system/mobile
        run: yarn build-storybook

      - name: Publish to Chromatic
        id: chromatic
        working-directory: packages/design-system/mobile
        run: yarn chromatic --storybook-build-dir=storybook-static
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN_MOBILE }}

      - name: Add Storybook URL to job summary
        if: steps.chromatic.outputs.storybookUrl != ''
        run: |
          echo "## 📱 Storybook Mobile" >> $GITHUB_STEP_SUMMARY
          echo "[Abrir no Chromatic](${{ steps.chromatic.outputs.storybookUrl }})" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Storybook URL
        if: github.event_name == 'pull_request' && steps.chromatic.outputs.storybookUrl != ''
        uses: actions/github-script@v7
        env:
          STORYBOOK_URL: ${{ steps.chromatic.outputs.storybookUrl }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 Storybook mobile publicado no Chromatic: ${process.env.STORYBOOK_URL}`
            })
